name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_VAR_project: ${{ vars.PROJECT }}
      TF_VAR_environment: dev
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
      TF_VAR_github_repo: ${{ vars.GITHUB_REPO }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
      TF_VAR_container_image: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.PROJECT }}-dev:latest"
      TF_VAR_enable_https: "false"
      TF_VAR_create_oidc_provider: "true"
      TF_VAR_acm_certificate_arn: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve -input=false

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging  # Requires manual approval in GitHub Environments settings
    env:
      TF_VAR_project: ${{ vars.PROJECT }}
      TF_VAR_environment: staging
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
      TF_VAR_github_repo: ${{ vars.GITHUB_REPO }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
      TF_VAR_container_image: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.PROJECT }}-staging:latest"
      TF_VAR_enable_https: "false"
      TF_VAR_create_oidc_provider: "false"
      TF_VAR_acm_certificate_arn: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/staging
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply
        working-directory: terraform/environments/staging
        run: terraform apply -auto-approve -input=false

  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod  # Requires manual approval in GitHub Environments settings
    env:
      TF_VAR_project: ${{ vars.PROJECT }}
      TF_VAR_environment: prod
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
      TF_VAR_github_repo: ${{ vars.GITHUB_REPO }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
      TF_VAR_container_image: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.PROJECT }}-prod:latest"
      TF_VAR_enable_https: "true"
      TF_VAR_create_oidc_provider: "false"
      # ACM_CERTIFICATE_ARN secret must be set in GitHub Secrets before enabling HTTPS
      TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve -input=false
