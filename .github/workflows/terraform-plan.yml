name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read
  pull-requests: write  # Required to post plan as PR comment

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  detect-environment:
    name: Detect Changed Environment
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.detect.outputs.environments }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed environments
        id: detect
        run: |
          # Find which environment directories changed
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep "^terraform/environments/" | \
            awk -F/ '{print $3}' | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')

          # Default to dev if only module files changed
          if [ "$CHANGED" = "[]" ]; then
            CHANGED='["dev"]'
          fi

          echo "environments=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Environments to plan: $CHANGED"

  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: detect-environment
    strategy:
      matrix:
        environment: ${{ fromJson(needs.detect-environment.outputs.environments) }}
      fail-fast: false
    env:
      # Variables common to all environments — set in GitHub Actions Settings > Variables
      TF_VAR_project: ${{ vars.PROJECT }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_github_org: ${{ vars.GITHUB_ORG }}
      TF_VAR_github_repo: ${{ vars.GITHUB_REPO }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment-specific Terraform variables
        run: |
          ENV="${{ matrix.environment }}"

          # Derive container image URI from account/region/project/env — no separate var needed
          echo "TF_VAR_environment=${ENV}" >> "$GITHUB_ENV"
          echo "TF_VAR_container_image=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.PROJECT }}-${ENV}:latest" >> "$GITHUB_ENV"

          case "${ENV}" in
            dev)
              echo "TF_VAR_enable_https=false" >> "$GITHUB_ENV"
              echo "TF_VAR_create_oidc_provider=true" >> "$GITHUB_ENV"
              echo "TF_VAR_acm_certificate_arn=" >> "$GITHUB_ENV"
              ;;
            staging)
              echo "TF_VAR_enable_https=false" >> "$GITHUB_ENV"
              echo "TF_VAR_create_oidc_provider=false" >> "$GITHUB_ENV"
              echo "TF_VAR_acm_certificate_arn=" >> "$GITHUB_ENV"
              ;;
            prod)
              echo "TF_VAR_enable_https=true" >> "$GITHUB_ENV"
              echo "TF_VAR_create_oidc_provider=false" >> "$GITHUB_ENV"
              # ACM_CERTIFICATE_ARN secret required in prod; leave empty until cert is provisioned
              echo "TF_VAR_acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Validate
        id: validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(
              'terraform/environments/${{ matrix.environment }}/plan_output.txt',
              'utf8'
            ).slice(0, 60000); // GitHub comment limit

            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = [
              `## ${status} Terraform Plan — \`${{ matrix.environment }}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${{ github.actor }} | Workflow: \`${{ github.workflow }}\`*`,
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Terraform Plan') &&
              c.body.includes('`${{ matrix.environment }}`')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Check Plan Result
        if: steps.plan.outcome == 'failure'
        run: exit 1
